<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hitster Geschenk</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">

</head>
